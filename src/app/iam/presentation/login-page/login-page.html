<div class="login-page">
  <header class="login-toolbar">
    <app-language-switcher />
  </header>

  <main class="login-main">
    <div class="login-container">
      
      <!-- Columna Izquierda - Branding con Animación de Fondo -->
      <div class="login-sidebar">
        <div class="bg-slideshow">
          <div class="bg-slide slide-1"></div>
          <div class="bg-slide slide-2"></div>
        </div>
        <div class="sidebar-overlay"></div>
        <div class="sidebar-content">
          <div class="brand-section">
            <img class="logo" src="/imagenes/logo_infratrack-sinfondo.png" [attr.alt]="'app.title' | translate" />
            <div class="brand-text">
              <span class="brand-name">INFRATRACK</span>
            </div>
            <p class="brand-desc">{{ 'login.brandDescription' | translate }}</p>
          </div>
        </div>
      </div>

      <!-- Columna Derecha - Simulador de Login -->
      <div class="login-panel">
        <div class="login-content-wrapper">
          <h1 class="welcome-title">{{ 'login.welcomeTitle' | translate }}</h1>
          <p class="welcome-subtitle">{{ 'login.welcomeSubtitle' | translate }}</p>

          <div class="roles-grid">
            <!-- Card Dueño -->
            <button class="role-card" (click)="simulateLogin('owner')">
              <div class="role-card-header">
                <span class="material-icons-outlined role-icon">factory</span>
                <span class="role-title">{{ 'login.roleOwnerTitle' | translate }}</span>
              </div>
              <div class="role-card-body">
                <div class="role-name">{{ 'login.roleOwnerName' | translate }}</div>
                <div class="role-desc">{{ 'login.roleOwnerDesc' | translate }}</div>
              </div>
              <div class="role-card-footer">
                <span class="role-badge badge-owner">{{ 'login.badgeOwner' | translate }}</span>
              </div>
            </button>

            <!-- Card Admin -->
            <button class="role-card" (click)="simulateLogin('admin')">
              <div class="role-card-header">
                <span class="material-icons-outlined role-icon">receipt_long</span>
                <span class="role-title">{{ 'login.roleAdminTitle' | translate }}</span>
              </div>
              <div class="role-card-body">
                <div class="role-name">{{ 'login.roleAdminName' | translate }}</div>
                <div class="role-desc">{{ 'login.roleAdminDesc' | translate }}</div>
              </div>
              <div class="role-card-footer">
                <span class="role-badge badge-admin">{{ 'login.badgeAdmin' | translate }}</span>
              </div>
            </button>
          </div>

          <p class="login-footnote">{{ 'login.footnote' | translate }}</p>
        </div>
      </div>

    </div>
  </main>
</div>
