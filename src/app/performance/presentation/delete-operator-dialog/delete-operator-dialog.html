<h2 mat-dialog-title>{{ 'performance.deleteOperator.title' | translate }}</h2>

<mat-dialog-content class="dod">
  <p>{{ 'performance.deleteOperator.body' | translate: { name: data.name } }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [mat-dialog-close]="false">{{ 'performance.deleteOperator.cancel' | translate }}</button>
  <button mat-flat-button color="warn" type="button" (click)="confirm()">
    {{ 'performance.deleteOperator.confirm' | translate }}
  </button>
</mat-dialog-actions>
